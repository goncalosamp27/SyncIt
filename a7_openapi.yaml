openapi: 3.0.0

info:
  version: '1.0'
  title: 'LBAW SyncIt! Web API'
  description: 'Web Resources Specification (A7) for SyncIt!'

servers:
- url: http://lbaw24115.lbaw.fe.up.pt
  description: Production server

externalDocs:
  description: Find more info here.
  url: https://gitlab.up.pt/lbaw/lbaw2425/lbaw24115/-/wikis/eap

tags:
  - name: 'M01: Authentication'
  - name: 'M02: Users'
  - name: 'M03: Events and Tickets'
  - name: 'M04: Polls and Comments'
  - name: 'M05: Administration'
  - name: 'M06: Notifications'


paths:

###################################AUTHENTICATION##############################################

##LOGIN
  /login:
    get:
      operationId: R101
      summary: 'R101: Login Form'
      description: 'Provide login form. Access: VST'
      tags:
        - 'M01: Authentication'
      responses:
        '200':
          description: 'Ok. Show log-in UI'
    post:
      operationId: R102
      summary: 'R102: Login Action'
      description: 'Processes the login form submission. Access: VST'
      tags:
        - 'M01: Authentication'
 
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email:          # <!--- form field name
                  type: string
                password:    # <!--- form field name
                  type: string
              required:
                - email
                - password
 
      responses:
        '302':
          description: 'Redirect after processing the login credentials.'
          headers:
            Location:
              schema:
                type: string
              examples:
                302Success:
                  description: 'Successful authentication. Redirect to homepage.'
                  value: '/home'
                302Error:
                  description: 'Failed authentication. Redirect to login form.'
                  value: '/login'
 
##LOGOUT
  /logout:
    post:
      operationId: R103
      summary: 'R103: Logout Action'
      description: 'Logout the current authenticated used. Access: MBR, ADM'
      tags:
        - 'M01: Authentication'
      responses:
        '302':
          description: 'Redirect after processing logout.'
          headers:
            Location:
              schema:
                type: string
              examples:
                302Success:
                  description: 'Successful logout. Redirect to login form.'
                  value: '/login'

##REGISTER
  /register:
    get:
      operationId: R104
      summary: 'R104: Register Form'
      description: 'Provide new user registration form. Access: VST'
      tags:
        - 'M01: Authentication'
      responses:
        '200':
          description: 'Ok. Show sign-up UI'

    post:
      operationId: R105
      summary: 'R105: Register Action'
      description: 'Processes the new user registration form submission. Access: VST'
      tags:
        - 'M01: Authentication'

      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                picture:
                  type: string
                  format: binary
              required:
                - email
                - password

      responses:
        '302':
          description: 'Redirect after processing the new user information.'
          headers:
            Location:
              schema:
                type: string
              examples:
                302Success:
                  description: 'Successful authentication. Redirect to user profile.'
                  value: '/users/{id}'
                302Failure:
                  description: 'Failed authentication. Redirect to login form.'
                  value: '/login'

###VERIFY EMAIL
  /verify-email/send:
    get:
      operationId: R106
      summary: 'R106: Send Verification Email'
      description: 'Sends a verification email with a confirmation link to the user. Access: VST'
      tags:
        - 'M01: Authentication'
      parameters:
        - in: query
          name: email
          schema:
            type: string
          required: true
          description: 'The email address to send the verification link'
      responses:
        '200':
          description: 'Verification email sent successfully.'
        '400':
          description: 'Invalid email address or request error.'
        '404':
          description: 'Email address not found.'


  /verify-email/confirm:
    get:
      operationId: R107
      summary: 'R107: Confirm Email Address'
      tags:
        - 'M01: Authentication'
      parameters:
        - in: query
          name: token
          schema:
            type: string
          required: true
      responses:
        '302':
          description: 'Redirect after confirmation.'
          headers:
            Location:
              schema:
                type: string
              examples:
                success:
                  value: '/homepage'
                error:
                  value: '/verify-email/error'

  /verify-email/status:
    get:
      operationId: R108
      summary: 'R108: Check Email Confirmation Status'
      description: 'Checks if the users email is confirmed. Access: VST'
      tags:
        - 'M01: Authentication'
      parameters:
        - in: query
          name: email
          schema:
            type: string
          required: true
          description: 'Email address to check confirmation status'
      responses:
        '200':
          description: 'Returns the email confirmation status.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                  confirmed:
                    type: boolean
                example:
                  email: 'user@example.com'
                  confirmed: true
        '404':
          description: 'Email address not found.'    

## RESET PASSWORD
  /reset-password/request:
    post:
      operationId: R109
      summary: 'R109: Request Password Reset'
      description: 'Allows a member to request a password reset using their username. Access: PUB'
      tags:
        - 'M01: Authentication'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: 'Username of the member requesting the password reset'
              required:
                - username
      responses:
        '200':
          description: 'Password reset request received. Verification token sent.'
        '404':
          description: 'User not found.'
        '500':
          description: 'Server error while processing the password reset request.'

  /reset-password/verify:
    get:
      operationId: R110
      summary: 'R110: Verify Password Reset Token'
      description: 'Verifies the password reset token sent to the user. Access: PUB'
      tags:
        - 'M01: Authentication'
      parameters:
        - in: query
          name: token
          schema:
            type: string
          required: true
          description: 'Unique token for password reset verification'
      responses:
        '200':
          description: 'Token is valid. Proceed to reset password.'
        '400':
          description: 'Invalid or expired token.'
        '404':
          description: 'Token not found.'
        '500':
          description: 'Server error during token verification.'

  /reset-password/update:
    post:
      operationId: R111
      summary: 'R111: Update Password'
      description: 'Allows a member to set a new password after verification. Access: PUB'
      tags:
        - 'M01: Authentication'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: 'Verification token for password reset'
                new_password:
                  type: string
                  description: 'The new password for the user account'
              required:
                - token
                - new_password
      responses:
        '200':
          description: 'Password updated successfully.'
        '400':
          description: 'Invalid input (e.g., weak password).'
        '404':
          description: 'Token not found or expired.'
        '500':
          description: 'Server error while updating the password.'        

######################################USERS###########################################

##VIEW PROFILE
  /users/{id}:
    get:
      operationId: R201
      summary: 'R201: View user profile'
      description: 'Show the individual user profile. Access: VST, MBR, OWN, ART, ADM'
      tags:
        - 'M02: Users'
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      responses:
        '200':
          description: 'Ok. Show view profile UI'
        '302':
          description: 'Redirect if user is not logged in or other user doesn’t exist'
          headers:
            Location:
              schema:
                type: string
              example:
                302Failure:
                  description: 'Failure.'

  ##VIEW FUTURE EVENTS
  /users/{id}/tickets:
    get:
      operationId: R202
      summary: 'R202: View user tickets'
      description: 'Show a list of tickets purchased by the user. Access: OWN, ADM'
      tags:
        - 'M02: Users'
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the user'
        - in: query
          name: offset
          schema:
            type: integer
          required: false
          description: 'Optional offset for pagination'
      responses:
        '200':
          description: 'List of tickets retrieved successfully.'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    ticket_id:
                      type: integer
                      description: 'Unique identifier of the ticket'
                    event_id:
                      type: integer
                      description: 'Unique identifier of the event'
                    event_title:
                      type: string
                      description: 'Title of the event'
                    event_date:
                      type: string
                      format: date-time
                      description: 'Date and time of the event'
                    seat:
                      type: string
                      description: 'Seat information (if applicable)'
                    price:
                      type: number
                      format: float
                      description: 'Price of the ticket'
                    purchase_date:
                      type: string
                      format: date-time
                      description: 'Date and time the ticket was purchased'
                  example:
                    - ticket_id: 1001
                      event_id: 301
                      event_title: 'Classical Strings Night'
                      event_date: '2024-05-12T19:00:00Z'
                      seat: 'A15'
                      price: 45.00
                      purchase_date: '2024-04-01T14:30:00Z'
                    - ticket_id: 1002
                      event_id: 302
                      event_title: 'Samba Dance Gala'
                      event_date: '2024-06-20T21:00:00Z'
                      seat: 'VIP2'
                      price: 120.00
                      purchase_date: '2024-05-10T16:45:00Z'
        '400':
          description: 'Invalid input data.'
        '401':
          description: 'Unauthorized. User is not logged in.'
        '404':
          description: 'User not found or no tickets found.'
        '500':
          description: 'Server error during retrieval of tickets.'

  ##VIEW PAST EVENTS
  /users/{id}/events/past:
    get:
      operationId: R203
      summary: 'R203: View user past events'
      description: 'Show a list of past events attended or created by the user. Access: OWN, ADM'
      tags:
        - 'M02: Users'
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the user'
        - in: query
          name: offset
          schema:
            type: integer
          required: false
          description: 'Optional offset for pagination'
      responses:
        '200':
          description: 'List of past events retrieved successfully.'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: 'Unique identifier of the event'
                    title:
                      type: string
                      description: 'Title of the event'
                    category:
                      type: string
                      description: 'Category of the event'
                    date:
                      type: string
                      format: date-time
                      description: 'Date and time of the event'
                    location:
                      type: string
                      description: 'Location of the event'
                    role:
                      type: string
                      enum: ['creator', 'participant']
                      description: 'User’s role in the event'
                  example:
                    - id: 201
                      title: 'Jazz Blues Night'
                      category: 'Music'
                      date: '2023-11-15T20:00:00Z'
                      location: 'Blue Note Club, New York, USA'
                      role: 'creator'
                    - id: 202
                      title: 'Tango in the Park'
                      category: 'Dance'
                      date: '2023-10-01T18:30:00Z'
                      location: 'Central Park, New York, USA'
                      role: 'participant'
        '400':
          description: 'Invalid input data.'
        '401':
          description: 'Unauthorized. User is not logged in.'
        '404':
          description: 'User not found.'
        '500':
          description: 'Server error during retrieval of past events.'



#################################EVENTS AND TICKETS####################################

##SEARCH EVENTS
  /events/search:
    get:
      operationId: R301
      summary: 'R301: Search Events API'
      description: 'Searches for events and returns the results as JSON. Access: MBR, ADM'

      tags: 
        - 'M03: Events and Tickets'

      parameters:
        - in: query
          name: search
          description: 'String to use for full-text search'
          schema:
            type: string
          required: false
        - in: query
          name: category
          description: 'Category of the event'
          schema:
            type: string
          required: false
        - in: query
          name: tag
          description: 'Tag of the event'
          schema:
            type: string
          required: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    title:
                      type: string
                    category:
                      type: string
                    tag:
                      type: string
                    owner:
                      type: string
                example:
                  - id: "123"
                    title: "Jazz Nights Festival"
                    category: "Music"
                    tag: "Jazz"
                    owner: "Emily Davis"

                  - id: "456"
                    title: "Salsa Under the Stars"
                    category: "Dance"
                    tag: "Salsa"
                    owner: "Carlos Rivera"

##CREATE EVENT
  /events/creation:
      post:
        operationId: R302
        summary: 'R302: Create Event with Media'
        description: 'Allows a member to create a new event with optional media uploads (images). Access: MBR'
        tags:
          - 'M03: Events and Tickets'
        requestBody:
          required: true
          content:
            multipart/form-data:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    description: 'Title of the event'
                  description:
                    type: string
                    description: 'Detailed description of the event'
                  location:
                    type: string
                    description: 'Location where the event will take place'
                  date:
                    type: string
                    format: date-time
                    description: 'Date and time of the event in ISO 8601 format'
                  duration:
                    type: integer
                    description: 'Duration of the event in minutes'
                  is_public:
                    type: boolean
                    description: 'Indicates if the event is public or private'
                  participants:
                    type: array
                    items:
                      type: string
                    description: 'List of participant emails to invite'
                  media:
                    type: array
                    items:
                      type: string
                      format: binary
                    description: 'Optional media files (images or videos) for the event'
                required:
                  - title
                  - date
                  - is_public
        responses:
          '201':
            description: 'Event created successfully.'
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: 'Unique identifier of the created event'
                    title:
                      type: string
                    date:
                      type: string
                    location:
                      type: string
                    media_urls:
                      type: array
                      items:
                        type: string
                      description: 'List of URLs for uploaded media files'
                example:
                  id: 123
                  title: 'Live House Mix'
                  date: '2024-12-01T14:00:00Z'
                  location: 'Avenida dos Aliados, Porto, Portugal'
                  media_urls:
                    - 'https://placeholder.com/media/event123/image1.jpg'
                    - 'https://placeholder.com/media/event123/image2.png'
          '400':
            description: 'Invalid input data.'
          '401':
            description: 'Unauthorized. User is not logged in.'
          '500':
            description: 'Server error during event creation.'

##INVITE TO EVENT
  /events/{event_id}/invite:
    post:
      operationId: R303
      summary: 'R303: Invite Users to Event by Username'
      description: 'Allows an artist to invite friends to their event using their usernames. The invite is sent as an in-app notification. Access: OWN'
      tags:
        - 'M03: Events and Tickets'
        - 'M06: Notifications'
      parameters:
        - in: path
          name: event_id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the event'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                usernames:
                  type: array
                  items:
                    type: string
                  description: 'List of usernames to invite to the event'
              required:
                - usernames
      responses:
        '200':
          description: 'Invitations sent successfully.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_id:
                    type: integer
                    description: 'ID of the event'
                  invited:
                    type: array
                    items:
                      type: string
                    description: 'List of successfully invited usernames'
                  failed:
                    type: array
                    items:
                      type: string
                    description: 'List of usernames where the invitation failed (e.g., user not found)'
                  notifications:
                    type: array
                    items:
                      type: object
                      properties:
                        username:
                          type: string
                        notification_status:
                          type: string
                          description: 'Status of the notification (e.g., sent, failed)'
              example:
                event_id: 123
                invited:
                  - 'john_doe'
                  - 'jane_smith'
                failed:
                  - 'unknown_user'
                notifications:
                  - username: 'john_doe'
                    notification_status: 'sent'
                  - username: 'jane_smith'
                    notification_status: 'sent'
                  - username: 'unknown_user'
                    notification_status: 'failed'
        '400':
          description: 'Invalid input data (e.g., malformed username).'
        '401':
          description: 'Unauthorized. User is not logged in.'
        '404':
          description: 'Event not found or username not found.'
        '500':
          description: 'Server error while sending invitations.'


##JOIN EVENT
  /events/{event_id}/join:
    post:
      operationId: R304
      summary: 'R304: Join Event'
      description: 'Allows a member to join an event and be added as a participant. Access: MBR'
      tags:
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: event_id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the event'
          responses:
            '200':
              description: 'Successfully joined the event. Member is added as a participant.'
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      event_id:
                        type: integer
                        description: 'ID of the event'
                      username:
                        type: string
                        description: 'Username of the participant'
                      status:
                        type: string
                        description: 'Participation status (e.g., joined)'
                      example:
                        event_id: 101
                        username: 'john_doe'
                        status: 'joined'
            '400':
              description: 'Invalid input data.'
            '401':
              description: 'Unauthorized. User is not logged in.'
            '404':
              description: 'Event not found.'
            '409':
              description: 'User is already a participant.'
            '500':
              description: 'Server error during participation process.'

##LEAVE EVENT     
  /events/{event_id}/leave:
    post:
      operationId: R305
      summary: 'R305: Leave Event'
      description: 'Allows a member to leave an event and be removed as a participant. Access: MBR'
      tags:
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: event_id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the event'
      responses:
        '200':
          description: 'Successfully left the event. Member is removed from the participant list.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_id:
                    type: integer
                    description: 'ID of the event'
                  username:
                    type: string
                    description: 'Username of the participant'
                  status:
                    type: string
                    description: 'Participation status (e.g., left)'
              example:
                event_id: 101
                username: 'john_doe'
                status: 'left'
        '400':
          description: 'Invalid input data.'
        '401':
          description: 'Unauthorized. User is not logged in.'
        '404':
          description: 'Event not found or user not a participant.'
        '500':
          description: 'Server error during leave process.'

##VIEW EVENT
  /events/{event_id}/view:
    get:
      operationId: R306
      summary: 'R306: View Event Details'
      description: 'Retrieves detailed information about a specific event, including media, ratings, and other necessary data. Access: MBR, ADM'
      tags:
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: event_id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the event'
      responses:
        '200':
          description: 'Event details retrieved successfully.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: 'Unique identifier of the event'
                  title:
                    type: string
                    description: 'Title of the event'
                  description:
                    type: string
                    description: 'Detailed description of the event'
                  category:
                    type: string
                    description: 'Category of the event'
                  tags:
                    type: array
                    items:
                      type: string
                    description: 'Tags associated with the event'
                  date:
                    type: string
                    format: date-time
                    description: 'Date and time of the event in ISO 8601 format'
              
                  location:
                    type: string
                    description: 'Location of the event'
                  owner:
                    type: string
                    description: 'Username of the event owner'
                  is_public:
                    type: boolean
                    description: 'Indicates if the event is public or private'
                  media_urls:
                    type: array
                    items:
                      type: string
                    description: 'List of URLs for event media files'
                  rating:
                    type: object
                    properties:
                      average:
                        type: number
                        format: float
                        description: 'Average rating of the event'
                      count:
                        type: integer
                        description: 'Number of ratings received'
                  example:
                    id: 101
                    title: 'Tropical Salsa Night'
                    description: 'An energetic salsa dancing event under the stars with live music.'
                    category: 'Dance'
                    tags:
                      - 'Salsa'
                      - 'Live Music'
                    date: '2024-12-15T20:00:00Z'
                    location: 'Havana Club, Miami, USA'
                    owner: 'carlos_rivera'
                    is_public: true
                    media_urls:
                      - 'https://placeholder.com/media/event101/image1.jpg'
                      - 'https://placeholder.com/media/event101/image2.png'
                    rating:
                      average: 4.9
                      count: 50
        '400':
          description: 'Invalid input data.'
        '401':
          description: 'Unauthorized. User is not logged in.'
        '404':
          description: 'Event not found.'
        '500':
          description: 'Server error during event retrieval.'

    

###############################POLLS AND COMMENTS####################################


###############################ADMINISTRATION####################################

 ##CREATE USER ACCOUNTS

  /admin/user:
    post:
      operationId: R501
      summary: 'R501: Create User Account'
      description: 'Creates a new user account with specified details. Access: ADM'
      tags:
        - 'M05: Administration'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              parameters:
                name:
                  type: string
                email:
                  type: string
                picture:
                  type: string
                  format: binary
              required:
                - email
                - password

      responses:
        '302':
          description: 'Redirect after processing the new user information.'
          headers:
            Location:
              schema:
                type: string
              examples:
                302Success:
                  description: 'Successful authentication. Redirect to user profile.'
                  value: '/users/{id}'
                302Failure:
                  description: 'Failed authentication. Redirect to login form.'
                  value: '/login'
        '400':
          description: 'Bad Request. Invalid input.'
        '401':
          description: 'Unauthorized. Admin access required.'

 ##SEARCH FOR USERS

  /admin/search:
    get:
      operationId: R502
      summary: 'R502: Search for Users'
      description: 'Search for users based on query parameters. Access: ADM'
      tags:
        - 'M05: Administration'
      parameters:
        - in: query
          name: username
          schema:
            type: string
          required: false
          description: 'Filter users by username'
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: 'Filter users by name'
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          required: false
          description: 'Limit the number of results returned'
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          required: false
          description: 'Page number for pagination'
      responses:
        '200':
          description: 'Ok. Return a list of users matching the search criteria.'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      format: int64
                    username:
                      type: string
                    email:
                      type: string
                      format: email
                    name:
                      type: string
                  example:
                    id: 1
                    username: 'john_doe'
                    email: 'johndoe@gmail.com'
