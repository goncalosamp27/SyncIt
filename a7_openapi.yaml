components:
  schemas:
    Event:
      type: object
      properties:
        title:
          type: string
          description: 'Title of the event'
        description:
          type: string
          description: 'Detailed description of the event'
        type:
          type: string
          description: 'Category of the event (e.g., Dance, Music, Workshop, etc.)'
        date:
          type: string
          format: date-time
          description: 'Date and time of the event in ISO 8601 format'
        location:
          type: string
          description: 'Location of the event'
        media_urls:
          type: array
          items:
            type: string
            format: uri
          description: 'URLs for event media (e.g., images, videos)'
        is_public:
          type: boolean
          description: 'Indicates whether the event is public or private'
        tags:
          type: array
          items:
            type: string
          description: 'Tags related to the event'
        price:
          type: number
          format: float
          description: 'Price of the event, if applicable (e.g., ticket price)'
        ticket_limit:
          type: integer
          description: 'The maximum number of tickets available for this event'
        refund_policy:
          type: integer
          description: 'Refund percentage of the ticket price'
      example:
        title: 'Salsa Night with Live Music'
        description: 'Join us for an evening of vibrant salsa dancing and live music under the stars.'
        type: 'Dance'
        date: '2024-12-15T20:00:00Z'
        location: 'Havana Club, Miami, USA'
        media_urls:
          - 'https://example.com/media/event101/image1.jpg'
          - 'https://example.com/media/event101/image2.png'
        is_public: true
        tags:
          - 'Salsa'
          - 'Live Music'
        price: 20.00
        ticket_limit: 500
        refund_policy: 100

    UserEvent:
      type: object
      properties:
        event_id:
          type: integer
          description: 'ID of the event'
        username:
          type: string
          description: 'Username of the participant'
        status:
          type: string
          description: 'Participation status (e.g., left)'
    example:
      event_id: 101
      username: 'john_doe'
      status: 'left'
  
    User:
      type: object
      properties:
        username:
          type: string
          description: 'Username of the member'
          required: false
        bio:
          type: string
          description: 'Biography of the member'
          required: false
        image:
          type: string
          format: uri
          description: 'URL pointing to the profile picture of the member'
          required: false
        name:
          type: string
          description: 'Full name of the member'
          required: false
        email:
          type: string
          format: email
          description: 'Email address of the member'
          required: false
        phone:
          type: string
          description: 'Phone number of the member'
          required: false
        address:
          type: string
          description: 'Physical address of the member'
          required: false
      example:
        - username: 'john_doe123'
          bio: 'A software developer passionate about open-source projects.'
          image: 'https://example.com/images/john_doe123.png'
          name: 'John Doe'
          email: 'john.doe@example.com'
          phone: '123456789'
          address: '123 Main St, Springfield, IL, 62701'

    Ticket:
      type: object
      properties:
        ticket_id:
          type: integer
          description: 'Unique identifier of the ticket'
        event_id:
          type: integer
          description: 'Unique identifier of the event'
        event_title:
          type: string
          description: 'Title of the event'
        event_date:
          type: string
          format: date-time
          description: 'Date and time of the event'
        seat:
          type: string
          description: 'Seat information (if applicable)'
        price:
          type: number
          format: float
          description: 'Price of the ticket'
        purchase_date:
          type: string
          format: date-time
          description: 'Date and time the ticket was purchased'
      example:
        - ticket_id: 1001
          event_id: 301
          event_title: 'Classical Strings Night'
          event_date: '2024-05-12T19:00:00Z'
          seat: 'A15'
          price: 45.00
          purchase_date: '2024-04-01T14:30:00Z'
        - ticket_id: 1002
          event_id: 302
          event_title: 'Samba Dance Gala'
          event_date: '2024-06-20T21:00:00Z'
          seat: 'VIP2'
          price: 120.00
          purchase_date: '2024-05-10T16:45:00Z'

  responses:
      BadRequest:
        description: 'Bad Request. The request could not be understood or was missing required parameters.'
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
                  example: 'Invalid request parameters.'
      Unauthorized:
        description: 'Unauthorized. Authentication is required to access this resource.'
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
                  example: 'User is not authenticated.'
      NotFound:
        description: 'Not Found. The requested resource could not be found.'
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
                  example: 'Resource not found.'
      InternalServerError:
        description: 'Internal Server Error. An unexpected error occurred on the server.'
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
                  example: 'Something went wrong on the server.'