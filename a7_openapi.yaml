openapi: 3.0.0

info:
  version: '1.0'
  title: 'LBAW SyncIt! Web API'
  description: 'Web Resources Specification (A7) for SyncIt!'

servers:
- url: http://lbaw24115.lbaw.fe.up.pt
  description: Production server

externalDocs:
  description: Find more info here.
  url: https://gitlab.up.pt/lbaw/lbaw2425/lbaw24115/-/wikis/eap

tags:
  - name: 'M01: Authentication'
  - name: 'M02: Users'
  - name: 'M03: Events and Tickets'
  - name: 'M04: Polls and Comments'
  - name: 'M05: Administration'
  - name: 'M06: Notifications'


paths:

###################################AUTHENTICATION##############################################

##LOGIN
  /login:
    get:
      operationId: R101
      summary: 'R101: Login Form'
      description: 'Provide login form. Access: VST'
      tags:
        - 'M01: Authentication'
      responses:
        '200':
          description: 'Ok. Show log-in UI'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: R102
      summary: 'R102: Login Action'
      description: 'Processes the login form submission. Access: VST'
      tags:
        - 'M01: Authentication'
 
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email:          # <!--- form field name
                  type: string
                password:    # <!--- form field name
                  type: string
              required:
                - email
                - password
 
      responses:
        '302':
          description: 'Redirect after processing the login credentials.'
          headers:
            Location:
              schema:
                type: string
              examples:
                302Success:
                  description: 'Successful authentication. Redirect to homepage.'
                  value: '/home'
                302Error:
                  description: 'Failed authentication. Redirect to login form.'
                  value: '/login'
        '500':
          $ref: '#/components/responses/InternalServerError'
 
##LOGOUT
  /logout:
    post:
      operationId: R103
      summary: 'R103: Logout Action'
      description: 'Logout the current authenticated used. Access: MBR, ADM'
      tags:
        - 'M01: Authentication'
      responses:
        '302':
          description: 'Redirect after processing logout.'
          headers:
            Location:
              schema:
                type: string
              examples:
                302Success:
                  description: 'Successful logout. Redirect to login form.'
                  value: '/login'
        '500':
          $ref: '#/components/responses/InternalServerError'

##REGISTER
  /register:
    get:
      operationId: R104
      summary: 'R104: Register Form'
      description: 'Provide new user registration form. Access: VST'
      tags:
        - 'M01: Authentication'
      responses:
        '200':
          description: 'Ok. Show sign-up UI'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      operationId: R105
      summary: 'R105: Register Action'
      description: 'Processes the new user registration form submission. Access: VST'
      tags:
        - 'M01: Authentication'

      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                picture:
                  type: string
                  format: binary
              required:
                - email
                - password

      responses:
        '302':
          description: 'Redirect after processing the new user information.'
          headers:
            Location:
              schema:
                type: string
              examples:
                302Success:
                  description: 'Successful authentication. Redirect to user profile.'
                  value: '/users/{id}'
                302Failure:
                  description: 'Failed authentication. Redirect to login form.'
                  value: '/login'

###VERIFY EMAIL
  /verify-email/send:
    post: 
      operationId: R106
      summary: 'R106: Send Verification Email'
      description: 'Sends a verification email with a confirmation link to the user. Access: VST'
      tags:
        - 'M01: Authentication'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: 'The email address to send the verification link'
        responses:
          '302':
            description: 'Redirect to success or error page.'
            headers:
              Location:
                schema:
                  type: string
                examples:
                  success:
                    value: '/verify-email/confirm' 
                  error:
                    value: '/verify-email/error'
          '400':
            $ref: '#/components/responses/BadRequest'
          '401':
            $ref: '#/components/responses/Unauthorized'
          '404':
            $ref: '#/components/responses/NotFound'
          '500':
            $ref: '#/components/responses/InternalServerError'

  /verify-email/confirm:
    get:
      operationId: R107
      summary: 'R107: Confirm Email Address'
      tags:
        - 'M01: Authentication'
      parameters:
        - in: query
          name: token
          schema:
            type: string
          required: true
      responses:
        '302':
          description: 'Redirect after confirmation.'
          headers:
            Location:
              schema:
                type: string
              examples:
                success:
                  value: '/homepage'
                error:
                  value: '/verify-email/error'

  /verify-email/status:
    get:
      operationId: R108
      summary: 'R108: Check Email Confirmation Status'
      description: 'Checks if the users email is confirmed. Access: VST'
      tags:
        - 'M01: Authentication'
      parameters:
        - in: query
          name: email
          schema:
            type: string
          required: true
          description: 'Email address to check confirmation status'
      responses:
        '200':
          description: 'Returns the email confirmation status.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                  confirmed:
                    type: boolean
                example:
                  email: 'user@example.com'
                  confirmed: true
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'   

## RESET PASSWORD
  /reset-password/request:
    post:
      operationId: R109
      summary: 'R109: Request Password Reset'
      description: 'Allows a member to request a password reset using their username. Access: PUB'
      tags:
        - 'M01: Authentication'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: 'Username of the member requesting the password reset'
              required:
                - username
      responses:
        '200':
          description: 'Password reset request received. Verification token sent.'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /reset-password/verify:
    get:
      operationId: R110
      summary: 'R110: Verify Password Reset Token'
      description: 'Verifies the password reset token sent to the user. Access: PUB'
      tags:
        - 'M01: Authentication'
      parameters:
        - in: query
          name: token
          schema:
            type: string
          required: true
          description: 'Unique token for password reset verification'
      responses:
        '200':
          description: 'Token is valid. Proceed to reset password.'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /reset-password/update:
    post:
      operationId: R111
      summary: 'R111: Update Password'
      description: 'Allows a member to set a new password after verification. Access: PUB'
      tags:
        - 'M01: Authentication'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: 'Verification token for password reset'
                new_password:
                  type: string
                  description: 'The new password for the user account'
              required:
                - token
                - new_password
      responses:
        '200':
          description: 'Password updated successfully.'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'      

######################################USERS###########################################

  /users/{id}:
  ##VIEW PROFILE
    get:
      operationId: R201
      summary: 'R201: View user profile'
      description: 'Show the individual user profile. Access: VST, MBR, OWN, ART, ADM'
      tags:
        - 'M02: Users'
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      responses:
        '200':
          description: 'Ok. Show view profile UI'
        '302':
          description: 'Redirect if user is not logged in or other user doesn’t exist'
          headers:
            Location:
              schema:
                type: string
              example:
                302Failure:
                  description: 'Failure.'

    ## EDIT PROFILE   
    put:
      operationId: R202
      summary: 'R202: Edit Profile'
      description: 'Allows a member to edit their profile information. Access: OWN.'
      tags:
        - 'M02: Users'
      requestBody:
        required: true
        description: 'Member profile details to be updated.'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: 'Profile updated successfully.'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  ##VIEW FUTURE EVENTS
  /users/{id}/tickets:
    get:
      operationId: R203
      summary: 'R203: View user tickets'
      description: 'Show a list of tickets purchased by the user. Access: OWN, ADM'
      tags:
        - 'M02: Users'
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the user'
        - in: query
          name: offset
          schema:
            type: integer
          required: false
          description: 'Optional offset for pagination'
      responses:
        '200':
          description: 'List of tickets retrieved successfully.'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  ##VIEW PAST EVENTS
  /users/{id}/events/past:
    get:
      operationId: R204
      summary: 'R204: View user past events'
      description: 'Show a list of past events attended or created by the user. Access: OWN, ADM'
      tags:
        - 'M02: Users'
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the user'
        - in: query
          name: offset
          schema:
            type: integer
          required: false
          description: 'Optional offset for pagination'
      responses:
        '200':
          description: 'List of past events retrieved successfully.'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'



#################################EVENTS AND TICKETS####################################

##SEARCH EVENTS
  /events/search:
    get:
      operationId: R301
      summary: 'R301: Search Events API'
      description: 'Searches for events and returns the results as JSON. Access: MBR, ADM'

      tags: 
        - 'M03: Events and Tickets'

      parameters:
        - in: query
          name: search
          description: 'String to use for full-text search'
          schema:
            type: string
          required: false
        - in: query
          name: category
          description: 'Category of the event'
          schema:
            type: string
          required: false
        - in: query
          name: tag
          description: 'Tag of the event'
          schema:
            type: string
          required: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'

##CREATE EVENT
  /events/creation:
      post:
        operationId: R302
        summary: 'R302: Create Event with Media'
        description: 'Allows a member to create a new event with optional media uploads (images). Access: MBR'
        tags:
          - 'M03: Events and Tickets'
        requestBody:
          required: true
          content:
            multipart/form-data:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    description: 'Title of the event'
                  description:
                    type: string
                    description: 'Detailed description of the event'
                  location:
                    type: string
                    description: 'Location where the event will take place'
                  date:
                    type: string
                    format: date-time
                    description: 'Date and time of the event in ISO 8601 format'
                  duration:
                    type: integer
                    description: 'Duration of the event in minutes'
                  is_public:
                    type: boolean
                    description: 'Indicates if the event is public or private'
                  participants:
                    type: array
                    items:
                      type: string
                    description: 'List of participant emails to invite'
                  media:
                    type: array
                    items:
                      type: string
                      format: binary
                    description: 'Optional media files (images or videos) for the event'
                required:
                  - title
                  - date
                  - is_public
        responses:
          '201':
            description: 'Event created successfully.'
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Event'
          '400':
            $ref: '#/components/responses/BadRequest'
          '401':
            $ref: '#/components/responses/Unauthorized'
          '404':
            $ref: '#/components/responses/NotFound'
          '500':
            $ref: '#/components/responses/InternalServerError'

##INVITE TO EVENT
  /events/{event_id}/invite:
    post:
      operationId: R303
      summary: 'R303: Invite Users to Event by Username'
      description: 'Allows an artist to invite friends to their event using their usernames. The invite is sent as an in-app notification. Access: OWN'
      tags:
        - 'M03: Events and Tickets'
        - 'M06: Notifications'
      parameters:
        - in: path
          name: event_id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the event'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                usernames:
                  type: array
                  items:
                    type: string
                  description: 'List of usernames to invite to the event'
                  required: 'true'

      responses:
        '200':
          description: 'Invitations sent successfully.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_id:
                    type: integer
                    description: 'ID of the event'
                  invited:
                    type: array
                    items:
                      type: string
                    description: 'List of successfully invited usernames'
                  failed:
                    type: array
                    items:
                      type: string
                    description: 'List of usernames where the invitation failed (e.g., user not found)'
                  notifications:
                    type: array
                    items:
                      type: object
                      properties:
                        username:
                          type: string
                        notification_status:
                          type: string
                          description: 'Status of the notification (e.g., sent, failed)'
              example:
                event_id: 123
                invited:
                  - 'john_doe'
                  - 'jane_smith'
                failed:
                  - 'unknown_user'
                notifications:
                  - username: 'john_doe'
                    notification_status: 'sent'
                  - username: 'jane_smith'
                    notification_status: 'sent'
                  - username: 'unknown_user'
                    notification_status: 'failed'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'


##JOIN EVENT
  /events/{event_id}/join:
    post:
      operationId: R304
      summary: 'R304: Join Event'
      description: 'Allows a member to join an event and be added as a participant. Access: MBR'
      tags:
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: event_id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the event'
          responses:
            '200':
              description: 'Successfully joined the event. Member is added as a participant.'
              content:
                application/json:
                  $ref: '#/components/schemas/UserEvent'
            '400':
              $ref: '#/components/responses/BadRequest'
            '401':
              $ref: '#/components/responses/Unauthorized'
            '404':
              $ref: '#/components/responses/NotFound'
            '409':
              description: 'User is already a participant.'
            '500':
              $ref: '#/components/responses/InternalServerError'


##LEAVE EVENT     
  /events/{event_id}/leave:
    post:
      operationId: R305
      summary: 'R305: Leave Event'
      description: 'Allows a member to leave an event and be removed as a participant. Access: MBR'
      tags:
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: event_id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the event'
      responses:
        '200':
          description: 'Successfully left the event. Member is removed from the participant list.'
          content:
            application/json:
              $ref: '#/components/schemas/UserEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /events/{event_id}/view:

  ##VIEW EVENT
    get:
      operationId: R306
      summary: 'R306: View Event Details'
      description: 'Retrieves detailed information about a specific event, including media, ratings, and other necessary data. Access: MBR, ADM'
      tags:
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: event_id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the event'
      responses:
        '200':
          description: 'Event details retrieved successfully.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'               
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
 
  ## PURCHASE TICKET
  /events/{event_id}/purchase:
    post:
      operationId: R307
      summary: 'R307: Purchase Tickets for an Event'
      description: 'Allows a member to purchase tickets for a specific event. Access: MBR, ART.'
      tags:
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: event_id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the event'
        - in: query
          name: quantity
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 1
          required: true
          description: 'Number of tickets to purchase. Maximum is 10 tickets per order.'
      responses:
        '200':
          description: 'Tickets purchased successfully.'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '409':
          description: 'Conflict. There are not enough tickets available or you have requested more tickets than the maximum allowed.'

  ## EDIT EVENT
  /events/{event_id}/edit:
    put:
      operationId: R308
      summary: 'R308: Edit Event Details'
      description: 'Allows an artist to edit the details of their event, such as title, description, date, location, etc. Access: ART, ADM'
      tags:
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: event_id
          schema:
            type: integer
          required: true
          description: 'Unique identifier of the event to be edited'
      requestBody:
        required: true
        description: 'Updated event details to be applied.'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
      responses:
        '200':
          description: 'Event details updated successfully.'
          content:
            schema:
              $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

## MANAGE EVENT PARTICIPANTS

  # Add participant to event
  /events/{event_id}/participants:
    post:
      operationId: R309
      summary: "R309: Add a member to an event's participant list"
      description: "Allows an artist to add a member to the event's participants by assigning them a ticket. Access OWN."
      tags:
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: event_id
          schema:
            type: integer
          required: true
          description: "Unique identifier of the event"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                member_id:
                  type: integer
                  description: "The unique identifier of the member being added to the event"
                  required: true
      responses:
        '200':
          description: "Member successfully added to the event."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '409':
          description: "Conflict. The member is already registered for this event."
  
  # Remove participant from event
  /events/{event_id}/participants/{ticket_id}:
    delete:
      operationId: R310
      summary: "R310: Remove a member from an event's participant list"
      description: "Allows an artist to remove a member from the event's participants by deleting their ticket. Access OWN."
      tags:
        - 'M03: Events and Tickets'
      parameters:
        - in: path
          name: event_id
          schema:
            type: integer
          required: true
          description: "Unique identifier of the event"
        - in: path
          name: ticket_id
          schema:
            type: integer
          required: true
          description: "Unique identifier of the ticket for the participant to be removed"
      responses:
        '200':
          description: "Member successfully removed from the event."
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'


###############################POLLS AND COMMENTS####################################


###############################ADMINISTRATION####################################

 ##CREATE USER ACCOUNTS

  /admin/user:
    post:
      operationId: R501
      summary: 'R501: Create User Account'
      description: 'Creates a new user account with specified details. Access: ADM'
      tags:
        - 'M05: Administration'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              parameters:
                name:
                  type: string
                email:
                  type: string
                picture:
                  type: string
                  format: binary
              required:
                - email
                - password
              example:
                name: 'John Doe'
                email: 'john.doe@example.com'
                picture: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUA...'

      responses:
        '302':
          description: 'Redirect after processing the new user information.'
          headers:
            Location:
              schema:
                type: string
              examples:
                302Success:
                  description: 'Successful authentication. Redirect to user profile.'
                  value: '/users/{id}'
                302Failure:
                  description: 'Failed authentication. Redirect to login form.'
                  value: '/login'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

 ##SEARCH FOR USERS

  /admin/search:
    get:
      operationId: R502
      summary: 'R502: Search for Users'
      description: 'Search for users based on query parameters. Access: ADM'
      tags:
        - 'M05: Administration'
      parameters:
        - in: query
          name: username
          schema:
            type: string
          required: false
          description: 'Filter users by username'
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: 'Filter users by name'
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          required: false
          description: 'Limit the number of results returned'
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          required: false
          description: 'Page number for pagination'
      example:
        username: 'john_doe'
        name: 'John Doe'
        limit: 10
        page: 1
      responses:
        '200':
          description: 'Ok. Return a list of users matching the search criteria.'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'


 ##EDIT USER ACCOUNTS

  /admin/users/{userId}:
    put:
      operationId: R503
      summary: 'R503: Edit User Account'
      description: 'Edit user account information. Access: ADM'
      tags:
        - 'M05: Administration'
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
            format: int64
          description: 'ID of the user to update'
        - in: body
          name: data
          required: true
          description: 'User data to be updated'
          schema:
            ref: '#/components/schemas/User'
      responses:
        '200':
          description: 'User updated successfully.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'


