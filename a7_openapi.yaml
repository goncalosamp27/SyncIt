 ##EDIT USER ACCOUNTS

  /admin/users/{userId}:
    put:
      operationId: R503
      summary: 'R503: Edit User Account'
      description: 'Edit user account information. Access: ADM'
      tags:
        - 'M05: Administration'
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
            format: int64
          description: 'ID of the user to update'
        - in: body
          name: data
          required: true
          description: 'User data to be updated'
          schema:
            type: object
            properties:
              username:
                type: string
                description: 'New username for the user'
              email:
                type: string
                format: email
                description: 'New email address for the user'
              name:
                type: string
                description: 'Full name of the user'
            required:
              - username
              - email
      responses:
        '200':
          description: 'User updated successfully.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  username:
                    type: string
                  email:
                    type: string
                    format: email
                  name:
                    type: string
                  message:
                    type: string
                    example: 'User updated successfully'
              example:
                id: 123
                username: "new_username"
                email: "new_email@example.com"
                name: "New Name"
                message: "User updated successfully"
        '400':
          description: 'Bad Request. Invalid input data or missing required fields.'
        '401':
          description: 'Unauthorized. Admin access required.'
        '404':
          description: 'Not Found. User with the specified ID does not exist.'
        '500':
          description: 'Internal Server Error. An unexpected error occurred.'


